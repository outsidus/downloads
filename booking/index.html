<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BookingApt 다운로드</title>
<style>
 body{font-family:-apple-system,system-ui,sans-serif;max-width:520px;margin:40px auto;padding:0 20px;color:#222}
 .card{border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-top:16px}
 .ver{font-size:15px;color:#555}.notes{margin:12px 0;color:#444;white-space:pre-wrap}
 a.btn{display:block;text-align:center;background:#4CAF50;color:#fff;text-decoration:none;padding:14px;border-radius:10px;font-size:17px;font-weight:bold;margin-top:14px}
 .small{font-size:12px;color:#888;margin-top:14px}
</style></head><body>
 <h1>⛳ BookingApt</h1>
 <div class="card">
  <div class="ver" id="ver">버전 정보 불러오는 중…</div>
  <div class="notes" id="notes"></div>
  <a class="btn" id="dl" href="#">APK 다운로드</a>
  <div class="small">설치 후 <b>접근성 서비스</b>·<b>다른 앱 위에 표시</b> 권한을 켜주세요.<br>
   앱 안 <b>업데이트 확인</b> 버튼으로 자동 업데이트도 됩니다.</div>
 </div>
 <script>
  fetch('version.json?_='+Date.now()).then(r=>r.json()).then(v=>{
   document.getElementById('ver').textContent='v'+v.versionName+' (#'+v.versionCode+')';
   document.getElementById('notes').textContent=v.notes||'';
   var a=document.getElementById('dl');a.href='bookingapt-'+v.versionName+'.apk';a.setAttribute('download','');
  }).catch(function(){document.getElementById('ver').textContent='version.json 을 불러오지 못했습니다.';});
 </script></body></html>
